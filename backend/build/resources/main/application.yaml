spring:
  application:
    name: flip67

  datasource:
    url: jdbc:postgresql://localhost:5433/flip67
    username: flip67
    password: flip67
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
server:
  address: 0.0.0.0

mybatis:
  type-handlers-package: com.redis.flip67.config.mybatis
  type-aliases-package: com.redis.flip67.config.mybatis
  configuration:
    map-underscore-to-camel-case: true
