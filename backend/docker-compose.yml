services:
  postgres:
    image: postgres:17
    container_name: flip67-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-flip67}
      POSTGRES_USER: ${POSTGRES_USER:-flip67}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flip67}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flip67} -d ${POSTGRES_DB:-flip67}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flip67-app
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-flip67}
      DB_USERNAME: ${POSTGRES_USER:-flip67}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-flip67}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      SERVER_PORT: 8080
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:

